server:
  port: ${WAREHOUSE_APP_PORT:9000}

spring:
  application:
    name: warehouse-app
  jmx:
    enabled: false
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${WAREHOUSE_DB_URL:jdbc:postgresql://localhost:5432/warehouse_management}
    username: ${WAREHOUSE_DB_USERNAME:postgres}
    password: ${WAREHOUSE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  flyway:
    enabled: ${WAREHOUSE_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

auth:
  mode: ${AUTH_MODE:public}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:warehouse-app}
    secret: ${AUTH_JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-bytes}
    access-token-expiration-seconds: ${AUTH_JWT_ACCESS_EXPIRATION_SECONDS:3600}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
  bootstrap:
    default-users-enabled: ${AUTH_BOOTSTRAP_DEFAULT_USERS_ENABLED:false}

ai:
  ollama:
    api-url: ${AI_OLLAMA_API_URL:http://localhost:11434}
    model: ${AI_OLLAMA_MODEL:stockmaster-ai}
    num-ctx: ${AI_OLLAMA_NUM_CTX:4096}
    connect-timeout-seconds: ${AI_OLLAMA_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${AI_OLLAMA_READ_TIMEOUT_SECONDS:120}



springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
