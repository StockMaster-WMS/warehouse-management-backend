server:
  port: ${WAREHOUSE_APP_PORT:9000}
  forward-headers-strategy: framework

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:warehouse-management-backend/.env[.properties]
  application:
    name: warehouse-app
  jmx:
    enabled: false
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${WAREHOUSE_DB_URL:jdbc:postgresql://localhost:5432/warehouse_management}
    username: ${WAREHOUSE_DB_USERNAME:postgres}
    password: ${WAREHOUSE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  flyway:
    enabled: ${WAREHOUSE_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: ${WAREHOUSE_FLYWAY_VALIDATE_ON_MIGRATE:true}
    repair-on-migrate: ${WAREHOUSE_FLYWAY_REPAIR_ON_MIGRATE:false}

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000, https://warehouse.codestack.live, https://warehouse.ryon.website, http://warehouse.ryon.website, https://apiwarehouse.ryon.website, http://apiwarehouse.ryon.website}
  openapi:
    server-url: ${OPENAPI_SERVER_URL:}
  config-encryption-key: ${APP_CONFIG_ENCRYPTION_KEY:${AUTH_JWT_SECRET:}}

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:warehouse-app}
    secret: ${AUTH_JWT_SECRET:}
    access-token-expiration-seconds: ${AUTH_JWT_ACCESS_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${AUTH_JWT_REFRESH_EXPIRATION_SECONDS:604800}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:auto}
    same-site: ${AUTH_COOKIE_SAME_SITE:auto}
  bootstrap:
    default-users-enabled: ${AUTH_BOOTSTRAP_DEFAULT_USERS_ENABLED:false}

ai:
  provider: ${AI_PROVIDER:ollama}
  engine:
    # Dán trực tiếp URL vào đây, không dùng biến môi trường
    url: https://barabara-chestiest-shonda.ngrok-free.dev/api/v1/ai
    connect-timeout: 5000
    read-timeout: 15000
  ollama:
    api-url: ${AI_OLLAMA_API_URL:http://localhost:11434}
    model: ${AI_OLLAMA_MODEL:stockmaster-ai}
    num-ctx: ${AI_OLLAMA_NUM_CTX:8192}
    connect-timeout-seconds: ${AI_OLLAMA_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${AI_OLLAMA_READ_TIMEOUT_SECONDS:120}
  openai:
    api-url: ${AI_OPENAI_API_URL:https://api.openai.com/v1}
    api-key: ${AI_OPENAI_API_KEY:}
    model: ${AI_OPENAI_MODEL:gpt-4o-mini}
    connect-timeout-seconds: ${AI_OPENAI_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${AI_OPENAI_READ_TIMEOUT_SECONDS:120}
  gemini:
    api-url: ${AI_GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
    api-key: ${AI_GEMINI_API_KEY:}
    model: ${AI_GEMINI_MODEL:gemini-2.5-flash}
    connect-timeout-seconds: ${AI_GEMINI_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${AI_GEMINI_READ_TIMEOUT_SECONDS:120}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
