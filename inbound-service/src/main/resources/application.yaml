server:
  port: ${INBOUND_SERVICE_PORT:9004}

spring:
  application:
    name: inbound-service
  datasource:
    url: ${INBOUND_DB_URL:jdbc:postgresql://localhost:5432/db_inbound}
    username: ${INBOUND_DB_USERNAME:postgres}
    password: ${INBOUND_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}