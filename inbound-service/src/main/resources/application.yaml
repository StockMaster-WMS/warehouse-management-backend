server:
  port: ${INBOUND_SERVICE_PORT:9004}

spring:
  application:
    name: inbound-service
  datasource:
    url: ${INBOUND_DB_URL:jdbc:postgresql://localhost:5432/db_inbound}
    username: ${INBOUND_DB_USERNAME:postgres}
    password: ${INBOUND_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${INBOUND_SHOW_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

gateway:
  url: ${GATEWAY_URL:http://localhost:9000}

springdoc:
  api-docs:
    path: /v3/api-docs