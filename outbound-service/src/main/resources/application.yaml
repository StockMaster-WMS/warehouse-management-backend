server:
  port: ${OUTBOUND_SERVICE_PORT:9005}

spring:
  application:
    name: outbound-service
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${OUTBOUND_DB_URL:jdbc:postgresql://localhost:5432/db_outbound}
    username: ${OUTBOUND_DB_USERNAME:postgres}
    password: ${OUTBOUND_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${OUTBOUND_SHOW_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: localhost

gateway:
  url: ${GATEWAY_URL:http://localhost:9000}

springdoc:
  api-docs:
    path: /v3/api-docs
