server:
  port: ${API_GATEWAY_PORT:9000}

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:../.env[.properties]

  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration

  # Kich hoat mau sac cho log console
  output:
    ansi:
      enabled: always

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true   # FIX: Cho phép OPTIONS đi qua handler
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"             # FIX: Dùng Pattern thay vì Origins
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        # === AUTH SERVICE DOCS ===
        - id: auth-service-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        # === AUTH SERVICE ===
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        # === PRODUCT SERVICE DOCS ===
        - id: product-service-docs
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        # === PRODUCT SERVICE ===
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/suppliers/**

        # === WAREHOUSE SERVICE DOCS ===
        - id: warehouse-service-docs
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/warehouse/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        # === WAREHOUSE SERVICE ===
        - id: warehouse-service
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/warehouse/**, /api/warehouses/**, /api/locations/**, /api/stocks/**

        # === INBOUND SERVICE DOCS ===
        - id: inbound-service-docs
          uri: lb://INBOUND-SERVICE
          predicates:
            - Path=/api/inbound/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        # === INBOUND SERVICE ===
        - id: inbound-service
          uri: lb://INBOUND-SERVICE
          predicates:
            - Path=/api/inbound/**, /api/inbounds/**, /api/purchase-orders/**, /api/po-items/**

        # === OUTBOUND SERVICE DOCS ===
        - id: outbound-service-docs
          uri: lb://OUTBOUND-SERVICE
          predicates:
            - Path=/api/outbound/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        # === OUTBOUND SERVICE ===
        - id: outbound-service
          uri: lb://OUTBOUND-SERVICE
          predicates:
            - Path=/api/outbound/**, /api/outbounds/**, /api/sales-orders/**, /api/picking-items/**

# === Cau hinh Discovery (Eureka) ===
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# === Cau hinh Swagger UI ===
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: "Xác thực"
        url: /api/auth/v3/api-docs
      - name: "Sản phẩm"
        url: /api/products/v3/api-docs
      - name: "Kho & Tồn"
        url: /api/warehouse/v3/api-docs
      - name: "Nhập hàng"
        url: /api/inbound/v3/api-docs
      - name: "Xuất hàng"
        url: /api/outbound/v3/api-docs

# === Cau hinh log de quan sat ===
logging:
  level:
    "[org.springframework.cloud.gateway]": ${API_GATEWAY_LOG_LEVEL:INFO}
    "[org.springframework.http.server.reactive]": ${API_GATEWAY_HTTP_LOG_LEVEL:WARN}
    "[org.springframework.web.reactive]": ${API_GATEWAY_WEB_LOG_LEVEL:WARN}
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"

app:
  gateway:
    security:
      enabled: false
      jwt-secret: ${GATEWAY_JWT_SECRET:dev-auth-jwt-secret-change-this-before-staging-or-production-2026}