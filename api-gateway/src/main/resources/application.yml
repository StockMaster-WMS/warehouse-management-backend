server:
  port: ${API_GATEWAY_PORT:9000}

spring:
  application:
    name: api-gateway
  config:
    # ./.env khi chạy từ gốc repo; ../.env khi chạy từ thư mục module (vd. cd api-gateway)
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]

  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration

  # Kich hoat mau sac cho log console
  output:
    ansi:
      enabled: always

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        # Gateway là lớp CORS duy nhất cho browser; không chuyển Origin xuống service để tránh header CORS bị nhân đôi.
        - RemoveRequestHeader=Origin
        - SetRequestHeader=X-Internal-Service-Token, ${INTERNAL_SERVICE_TOKEN:change-me-internal-service-token}

      routes:
        # === AUTH SERVICE DOCS ===
        # order thấp hơn = ưu tiên cao (tránh /api/*/v3/api-docs bị route ** nuốt mất SetPath)
        - id: auth-service-docs
          uri: lb://auth-service
          order: 0
          predicates:
            - Path=/api/auth/v3/api-docs/**
          filters:
            - RewritePath=/api/auth/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # === AUTH SERVICE ===
        - id: auth-service
          uri: lb://auth-service
          order: 100
          predicates:
            - Path=/api/auth/**

        # === PRODUCT SERVICE DOCS ===
        - id: product-service-docs
          uri: lb://product-service
          order: 0
          predicates:
            - Path=/api/products/v3/api-docs/**
          filters:
            - RewritePath=/api/products/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # === PRODUCT SERVICE ===
        - id: product-service
          uri: lb://product-service
          order: 100
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/suppliers/**

        # === WAREHOUSE SERVICE DOCS ===
        - id: warehouse-service-docs
          uri: lb://warehouse-service
          order: 0
          predicates:
            - Path=/api/warehouse/v3/api-docs/**
          filters:
            - RewritePath=/api/warehouse/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # === WAREHOUSE SERVICE ===
        - id: warehouse-service
          uri: lb://warehouse-service
          order: 100
          predicates:
            - Path=/api/warehouse/**, /api/warehouses/**, /api/locations/**, /api/stocks/**

        # === INBOUND SERVICE DOCS ===
        - id: inbound-service-docs
          uri: lb://inbound-service
          order: 0
          predicates:
            - Path=/api/inbound/v3/api-docs/**
          filters:
            - RewritePath=/api/inbound/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # === INBOUND SERVICE ===
        - id: inbound-service
          uri: lb://inbound-service
          order: 100
          predicates:
            - Path=/api/inbound/**, /api/inbounds/**, /api/purchase-orders/**, /api/po-items/**, /api/putaway-tasks/**, /api/inbound-receipts/**

        # === OUTBOUND SERVICE DOCS ===
        - id: outbound-service-docs
          uri: lb://outbound-service
          order: 0
          predicates:
            - Path=/api/outbound/v3/api-docs/**
          filters:
            - RewritePath=/api/outbound/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # === OUTBOUND SERVICE ===
        - id: outbound-service
          uri: lb://outbound-service
          order: 100
          predicates:
            - Path=/api/outbound/**, /api/outbounds/**, /api/customers/**, /api/sales-orders/**, /api/picking-items/**, /api/so-items/**

# === Cau hinh Discovery (Eureka) ===
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# === Cau hinh Swagger UI ===
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    # Gọi API cùng origin với trang Swagger (giảm lỗi CORS / Failed to fetch)
    use-root-path: true
    # Tắt validator online (đôi khi gây Failed to fetch trong browser)
    validator-url: ""
    urls:
      - name: "Xác thực"
        url: /api/auth/v3/api-docs
      - name: "Sản phẩm"
        url: /api/products/v3/api-docs
      - name: "Kho & Tồn"
        url: /api/warehouse/v3/api-docs
      - name: "Nhập hàng"
        url: /api/inbound/v3/api-docs
      - name: "Xuất hàng"
        url: /api/outbound/v3/api-docs

# === Cau hinh log de quan sat ===
logging:
  level:
    "[org.springframework.cloud.gateway]": ${API_GATEWAY_LOG_LEVEL:INFO}
    "[org.springframework.http.server.reactive]": ${API_GATEWAY_HTTP_LOG_LEVEL:WARN}
    "[org.springframework.web.reactive]": ${API_GATEWAY_WEB_LOG_LEVEL:WARN}
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"

app:
  gateway:
    security:
      # Mặc định bật tại gateway; có thể tắt cục bộ bằng GATEWAY_SECURITY_ENABLED=false
      enabled: ${GATEWAY_SECURITY_ENABLED:true}
      jwt-secret: ${AUTH_JWT_SECRET:${GATEWAY_JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-bytes}}
