server:
  port: 9000

spring:
  application:
    name: api-gateway

  # Kich hoat mau sac cho log console
  output:
    ansi:
      enabled: always

  cloud:
    gateway:
      routes:
        # === PRODUCT SERVICE ===
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        # === WAREHOUSE SERVICE ===
        - id: warehouse-service
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/warehouse/**
          filters:
            - StripPrefix=1

        # === INBOUND SERVICE (Nghiep vu nhap) ===
        - id: inbound-service
          uri: lb://INBOUND-SERVICE
          predicates:
            - Path=/api/inbound/**
          filters:
            - StripPrefix=1
            # - JwtAuthenticationFilter

        # === OUTBOUND SERVICE (Nghiep vu xuat) ===
        - id: outbound-service
          uri: lb://OUTBOUND-SERVICE
          predicates:
            - Path=/api/outbound/**
          filters:
            - StripPrefix=1
            # - JwtAuthenticationFilter

        # === AUTH SERVICE (Xac thuc) ===
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

# === Cau hinh Discovery (Eureka) ===
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# === Cau hinh Swagger UI ===
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: "1. Danh muc San pham"
        url: /api/products/v3/api-docs
      - name: "2. Quan ly Kho & Ton"
        url: /api/warehouse/v3/api-docs
      - name: "3. Quy trinh Nhap hang"
        url: /api/inbound/v3/api-docs
      - name: "4. Quy trinh Xuat hang"
        url: /api/outbound/v3/api-docs
      - name: "5. He thong Xac thuc"
        url: /api/auth/v3/api-docs

# === Bao mat (JWT) ===
jwt:
  secret: "YOUR_VERY_SECRET_KEY_THAT_IS_LONG_ENOUGH_FOR_HS256_ALGORITHM_2024"
  expiration: 86400000 # 1 ngay (ms)

# === Cau hinh log de de quan sat ===
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
