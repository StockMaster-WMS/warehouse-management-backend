name: Deploy to Google Cloud VM

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven (wrapper)
        run: ./mvnw -B -DskipTests package

      - name: Upload artifact to server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          source: 'target/*.jar'
          target: '~/app/warehouse-management-backend.jar'

      - name: Restart app on server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          script: |
            mkdir -p ~/app
            pkill -f "java -jar" || true
            mv ~/app/warehouse-management-backend.jar ~/app/warehouse-management-backend.jar || true
            nohup java -jar ~/app/warehouse-management-backend.jar --spring.profiles.active=prod > ~/app/backend.log 2>&1 &
            echo "Deploy thành công!"
