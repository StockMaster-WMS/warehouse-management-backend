server:
  port: ${AUTH_SERVICE_PORT:9011}

spring:
  application:
    name: auth-service
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${AUTH_DB_USERNAME:postgres}
    password: ${AUTH_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${AUTH_HIBERNATE_DDL_AUTO:update}
    show-sql: ${AUTH_SHOW_SQL:false}
    properties:
      hibernate.format_sql: ${AUTH_FORMAT_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.flywaydb: ${AUTH_FLYWAY_LOG_LEVEL:INFO}
    org.hibernate.orm.jpa: ${AUTH_HIBERNATE_LOG_LEVEL:INFO}

auth:
  mode: ${AUTH_MODE:secure}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    secret: ${AUTH_JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-bytes}
    access-token-expiration-seconds: ${AUTH_JWT_ACCESS_EXPIRATION_SECONDS:3600}
  blacklist:
    cleanup-interval-ms: ${AUTH_BLACKLIST_CLEANUP_INTERVAL_MS:3600000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: localhost

gateway:
  url: ${GATEWAY_URL:http://localhost:9000}

springdoc:
  api-docs:
    path: /v3/api-docs
