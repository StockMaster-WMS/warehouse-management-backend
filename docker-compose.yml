services:
  postgres:
    image: postgres:16-alpine
    container_name: warehouse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: warehouse_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_warehouse_management:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-app
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WAREHOUSE_APP_PORT: 9000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000,https://warehouse.ryon.website,http://warehouse.ryon.website,https://apiwarehouse.ryon.website,http://apiwarehouse.ryon.website}
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-https://apiwarehouse.ryon.website}
      WAREHOUSE_DB_URL: jdbc:postgresql://postgres:5432/warehouse_management
      WAREHOUSE_DB_USERNAME: postgres
      WAREHOUSE_DB_PASSWORD: postgres
      WAREHOUSE_FLYWAY_ENABLED: "true"
      AUTH_MODE: ${AUTH_MODE:-public}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-warehouse-app}
      AUTH_JWT_ACCESS_EXPIRATION_SECONDS: ${AUTH_JWT_ACCESS_EXPIRATION_SECONDS:-3600}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      AUTH_BOOTSTRAP_DEFAULT_USERS_ENABLED: ${AUTH_BOOTSTRAP_DEFAULT_USERS_ENABLED:-false}
      AI_OLLAMA_API_URL: ${AI_OLLAMA_API_URL:-http://host.docker.internal:11434}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-stockmaster-ai}
      AI_OLLAMA_CONNECT_TIMEOUT_SECONDS: ${AI_OLLAMA_CONNECT_TIMEOUT_SECONDS:-5}
      AI_OLLAMA_READ_TIMEOUT_SECONDS: ${AI_OLLAMA_READ_TIMEOUT_SECONDS:-120}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_warehouse_management:
