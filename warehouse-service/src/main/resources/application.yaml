server:
  port: ${WAREHOUSE_SERVICE_PORT:9003}

spring:
  application:
    name: warehouse-service
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${WAREHOUSE_DB_URL:jdbc:postgresql://localhost:5432/db_warehouse}
    username: ${WAREHOUSE_DB_USERNAME:postgres}
    password: ${WAREHOUSE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${WAREHOUSE_SHOW_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: localhost

gateway:
  url: ${GATEWAY_URL:http://localhost:9000}

springdoc:
  api-docs:
    path: /v3/api-docs
