server:
  port: ${WAREHOUSE_SERVICE_PORT:9003}

spring:
  application:
    name: warehouse-service
  datasource:
    url: ${WAREHOUSE_DB_URL:jdbc:postgresql://localhost:5432/db_warehouse}
    username: ${WAREHOUSE_DB_USERNAME:postgres}
    password: ${WAREHOUSE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
